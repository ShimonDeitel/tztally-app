<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Timezone Tally</title>
<style>
  body {
    margin: 0; background: #0a0d1e; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; text-align: center; padding: 40px 20px; box-sizing: border-box;
  }
  .wrap { max-width: 560px; }
  h1 { font-size: 2.2rem; margin-bottom: 0.5rem; color: #3f51b5; }
  p.tagline { font-size: 1.15rem; color: rgba(255,255,255,0.8); margin-bottom: 2rem; }
  .pill {
    display: inline-block; padding: 10px 22px; border-radius: 999px;
    background: #3f51b5; color: #fff; font-weight: 600; text-decoration: none;
    margin-bottom: 2.5rem;
  }
  .features { text-align: left; background: rgba(255,255,255,0.05); border-radius: 16px; padding: 24px 28px; margin-bottom: 2rem; }
  .features li { margin-bottom: 8px; color: rgba(255,255,255,0.85); }
  footer { font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-top: 2rem; }
  footer a { color: rgba(255,255,255,0.6); }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #3f51b555 0%, #3f51b500 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
  <div class="wrap">
    <h1>Timezone Tally</h1>
    <p class="tagline">Unlimited entries and a multi-city clock comparison view.</p>
    <span class="pill">Pro: $1.99/month</span>
    <div class="features">
      <strong>What Pro unlocks</strong>
      <ul>
        <li>Unlimited entries and a multi-city clock comparison view.</li>
      </ul>
    </div>
    <footer>
      &copy; 2026 Timezone Tally. <a href="privacy.html">Privacy</a> &middot; <a href="terms.html">Terms</a> &middot; s0533495227@gmail.com
    </footer>
  </div>
</body>
</html>
