name: TimezoneTally
options:
  bundleIdPrefix: com.shimondeitel.tztally
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  TimezoneTally:
    type: application
    platform: iOS
    sources:
      - path: TimezoneTally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tztally
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: TimezoneTally/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TimezoneTallyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TimezoneTallyTests
      - path: TimezoneTally.storekit
    dependencies:
      - target: TimezoneTally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tztally.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TimezoneTallyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TimezoneTallyUITests
    dependencies:
      - target: TimezoneTally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tztally.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  TimezoneTally:
    build:
      targets:
        TimezoneTally: all
        TimezoneTallyTests: [test]
        TimezoneTallyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: TimezoneTally.storekit
    test:
      config: Debug
      storeKitConfiguration: TimezoneTally.storekit
      targets:
        - TimezoneTallyTests
        - TimezoneTallyUITests
    archive:
      config: Release
